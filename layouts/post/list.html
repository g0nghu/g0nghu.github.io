{{ define "main" }}
  <article class="cf ph3 ph5-l pv3 pv4-l nested-copy-line-height">
    {{ with .Content }}
    <section class="f4 tc-l center measure-wide lh-copy nested-links mid-gray">
      {{ . }}
    </section>
    {{ end }}

    <section class="mw8 center">
      {{ range .Paginator.Pages }}
        {{ .Render "summary-with-image" }}
      {{ end }}
    </section>

    {{ partial "pagination.html" . }}
  </article>
{{ end }}
