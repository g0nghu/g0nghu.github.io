# Hugo Configuration
baseURL = 'https://g0nghu.github.io/'
locale = 'zh-CN'
title = '酒客临时委员会'
timeZone = 'Asia/Shanghai'
theme = 'stack'
paginate = 10

# Author
[author]
  name = 'g0nghu'

# Permalinks — match Hexo :year/:month/:day/:title/
[permalinks]
  posts = '/:year/:month/:day/:slug/'

# Taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Output formats for RSS
[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

# Image cache (required by official GitHub Pages workflow)
[caches]
  [caches.images]
    dir = ':cacheDir/images'

# Markup — allow raw HTML and protect KaTeX math from goldmark
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = false
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$']]
        inline = [['$', '$']]
  [markup.highlight]
    lineNos = false
    wrap = true

# Stack theme parameters
[params]
  mainSections = ['posts']
  description = '谓经海底问无由，恍惚使人愁'
  favicon = '/images/favicon.png'

  [params.sidebar]
    avatar = '/images/head.jpg'
    subtitle = '谓经海底问无由，恍惚使人愁'

  [params.colorScheme]
    toggle = true
    default = 'auto'

  [params.article]
    math = false
    toc = true
    readingTime = false

    [params.article.license]
      enabled = false

  [params.imageProcessing]
    [params.imageProcessing.content]
      enabled = true
    [params.imageProcessing.thumbnail]
      enabled = true

  [params.comments]
    enabled = false

  [params.widgets]
    homepage = [
      { type = 'search' },
      { type = 'archives', params = { limit = 5 } },
      { type = 'categories' },
      { type = 'tag-cloud', params = { limit = 10 } },
    ]
    page = [
      { type = 'toc' },
    ]

# Main navigation menu
[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 1
    [menu.main.params]
      icon = 'home'
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 2
    [menu.main.params]
      icon = 'archives'
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 3
    [menu.main.params]
      icon = 'search'

  # Social links
  [[menu.social]]
    identifier = 'github'
    name = 'GitHub'
    url = 'https://github.com/g0nghu'
    [menu.social.params]
      icon = 'brand-github'
      newTab = true
